<!doctype html>
<html class="no-js" lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title></title>

  <link rel="stylesheet" href="css/pico.min.css">
  <meta name="description" content="">

  <meta property="og:title" content="">
  <meta property="og:type" content="">
  <meta property="og:url" content="">
  <meta property="og:image" content="">
  <meta property="og:image:alt" content="">

  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.png">

  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#fafafa">
</head>

<body>

  <!-- Add your site or application content here -->
  <header class="container">
    <div class="grid">
      <div class="header__left">
        <article class="level">
          <div class="grid">
            <div class="level__current" id="level-current">0</div>
            <div class="level__progress"><progress id="level-progress" value="0" max="10" /></div>
          </div>
        </article>
      </div>
      <div class="header__center">
        <article class="feedback">
          <strong class="feedback__value" id="feedback-value">0</strong>
        </article>
      </div>
      <div class="header__right"></div>
    </div>
  </header>
  <main class="container">
    <button id="click-me" type="button">Click Me</button>
  </main>
  <script src="js/app.js"></script>

</body>

</html>
